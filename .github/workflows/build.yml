name: Build Artifacts

on:
  push:
  pull_request:
    branches:
      - master
  release:
    types:
      - published

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup Node.js dependencies
        run: npm install -g shx
      - uses: krdlab/setup-haxe@v1
      - name: Set up Haxelib dependencies
        run: |
          haxelib install crypto
          haxelib install colyseus-websocket
          haxelib install haxe-concurrent
          haxelib install hxjava
          haxelib git air https://github.com/tobil4sk/air
          haxelib install hxnodejs
          haxelib install hxcpp
          haxelib install dox
      - name: Build libraries
        run: haxe build.hxml
      - uses: actions/upload-artifact@v7
        with:
          name: SFS3_API_JVM.jar
          path: out/SFS3_API_JVM.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: SFS3_API_PY.py
          path: out/SFS3_API_PY.py
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: SFS3_API_AS3.swc
          path: out/SFS3_API_AS3.swc
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: SFS3_API_JS.js
          path: out/SFS3_API_JS.js
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: SFS3_API_Node.js
          path: out/SFS3_API_Node.js
          if-no-files-found: error
      - name: Upload Release Assets
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/SFS3_API_JVM.jar
            out/SFS3_API_PY.py
            out/SFS3_API_AS3.swc
            out/SFS3_API_JS.js
            out/SFS3_API_Node.js
      - name: Publish package to Haxelib
        if: github.event_name == 'release' && github.event.action == 'published'
        shell: bash
        env:
          HAXELIB_PASSWORD: ${{ secrets.HAXELIB_PASSWORD }}
        run: |
          zip -r sfs3-api.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "out/*" \
            -x "node_modules/*" \
            -x ".haxelib/*"
          haxelib submit sfs3-api.zip "$HAXELIB_PASSWORD" --always
      - name: Generate API docs with dox
        shell: bash
        run: |
          rm -rf docs
          mkdir -p docs/xml
          haxe -D doc-gen -xml docs/xml/doc.xml --class-path src --macro "include('sfs3.client')" -js /tmp/dox-docs.js
          haxelib run dox -i docs/xml -o docs -in sfs3.client --title "SFS3 API"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4